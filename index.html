<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Tracking Sandbox Game</title>

  <!-- Add fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="loading" class="overlay">
    <div class="spinner"></div>
    <h2 id="loading-text">Loading Sandbox...</h2>
  </div>

  <div id="canvas-container"></div>

  <label id="solid-toggle" class="hud-toggle hidden">
    <input type="checkbox" id="complex-solid-checkbox">
    [COMPLEX SOLIDS]
  </label>

  <label id="render-toggle" class="hud-toggle hidden">
    <input type="checkbox" id="webgl-checkbox">
    [WEBGL RENDER]
  </label>

  <label id="camera-toggle" class="hud-toggle hidden">
    <input type="checkbox" id="camera-checkbox">
    [CAMERA MIRROR]
  </label>

  <div id="gesture-legend" class="hidden">
    <h3>POWER SIGNS</h3>
    <ul>
      <li><span class="emoji">🔥</span> Fire: Pinky + Thumb</li>
      <li><span class="emoji">🗑️</span> Eraser: Index + Middle</li>
      <li><span class="emoji">🤏</span> Sand: Pinch & Move</li>
      <li><span class="emoji">👇</span> Water: Thumb Down</li>
    </ul>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>

  <script src="physics.js"></script>
  <script src="renderer.js"></script>
  <script src="sketch.js"></script>

</body>

</html>
