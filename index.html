<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Tracking Sandbox Game</title>

  <!-- Add fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="loading" class="overlay">
    <div class="spinner"></div>
    <h2 id="loading-text">Loading Sandbox...</h2>
  </div>

  <div id="canvas-container"></div>

  <!-- HUD panel stacks items naturally, no gaps -->
  <div id="hud-panel">
    <label id="camera-toggle" class="hud-toggle hidden">
      <input type="checkbox" id="camera-checkbox">
      [CAMERA MIRROR]
    </label>

    <div id="gesture-legend" class="hidden">
      <h3>POWER SIGNS</h3>
      <ul>
        <li><span class="emoji">🔥</span> Fire: Pinky + Thumb</li>
        <li><span class="emoji">🗑️</span> Eraser: Index + Middle</li>
        <li><span class="emoji">🤏</span> Sand: Pinch &amp; Move</li>
        <li><span class="emoji">👇</span> Water: Thumb Down</li>
      </ul>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <!-- Use unpkg or jsdelivr for ml5.js, specifically the new version that works well with p5 -->
  <script src="https://unpkg.com/ml5@1.0.1/dist/ml5.min.js"></script>

  <script src="physics.js"></script>
  <script src="renderer.js"></script>
  <script src="sketch.js"></script>

</body>

</html>
